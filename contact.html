<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amaranthine Personal Record System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<div class="root">
  <div class="scanline"></div>
  <div class="header">
    <div>
      <div class="title">GOV PERSONAL RECORD SYSTEM</div>
      <div class="id-num">&#9632; <span id="record-id">5195028</span> <span class="blink">_</span></div>
    </div>
    <div class="status-col">
      <div>STANDBY</div>
      <div class="live">CONNECTION ESTABLISHED</div>
      <div>RETRIEVING DATA</div>
      <div class="live">DATA RECEIVED</div>
      <div>DISPLAYING DATA</div>
      <div>CONNECTION IDLE</div>
      <div class="live">DATA REQUEST LOGGED</div>
    </div>
  </div>

  <div class="slider-section">
    <div class="slider-label">Are you scared?</div>
    <input type="range" min="0" max="100" value="72"
      oninput="document.getElementById('vibeVal').textContent = this.value + '% of fear.'">
    <div class="slider-value" id="vibeVal">72% of fear.</div>
  </div>
